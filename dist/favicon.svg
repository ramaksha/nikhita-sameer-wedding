<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle - gold -->
  <circle cx="50" cy="50" r="50" fill="#800020"/>
  <!-- Inner decorative ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
  <!-- N letter -->
  <text x="14" y="63" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#D4AF37" letter-spacing="-2">N</text>
  <!-- Ampersand divider -->
  <text x="46" y="55" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#FDFBF7" opacity="0.8">&amp;</text>
  <!-- S letter -->
  <text x="57" y="63" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#D4AF37" letter-spacing="-2">S</text>
  <!-- Small decorative dots -->
  <circle cx="50" cy="78" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="44" cy="78" r="1.5" fill="#D4AF37" opacity="0.4"/>
  <circle cx="56" cy="78" r="1.5" fill="#D4AF37" opacity="0.4"/>
</svg>